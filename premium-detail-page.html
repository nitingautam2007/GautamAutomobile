<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium Car Detail Page - Gautam Automobile</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://code.iconify.design/iconify-icon/1.0.7/iconify-icon.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@200;300;400;500;600;700&family=Playfair+Display:ital,wght@0,400;0,500;0,700;1,400&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #0a0a0f;
            --bg-mid: #1a1a20;
            --bg-card: rgba(255, 255, 255, 0.05);
            --red-primary: #dc2626;
            --red-glow: rgba(220, 38, 38, 0.3);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, var(--bg-dark) 0%, var(--bg-mid) 50%, #0d0d12 100%);
            color: #ffffff;
            min-height: 100vh;
            overflow-x: hidden;
        }

        .font-serif {
            font-family: 'Playfair Display', serif;
        }

        /* Glassmorphism Card */
        .glass-card {
            background: linear-gradient(to bottom right, rgba(255, 255, 255, 0.07), rgba(255, 255, 255, 0.03));
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        /* Premium Button */
        .btn-premium {
            background: linear-gradient(to right, #dc2626, #ef4444);
            box-shadow: 0 0 30px rgba(220, 38, 38, 0.3);
            transition: all 0.3s ease;
        }

        .btn-premium:hover {
            background: linear-gradient(to right, #ef4444, #f87171);
            box-shadow: 0 0 40px rgba(220, 38, 38, 0.5);
            transform: scale(1.02);
        }

        /* Tab Active State */
        .tab-active {
            background: rgba(220, 38, 38, 0.2);
            border-color: rgba(220, 38, 38, 0.5);
            color: #fca5a5;
            box-shadow: 0 0 20px rgba(220, 38, 38, 0.15);
        }

        /* Thumbnail Active */
        .thumbnail-active {
            border-color: #dc2626;
            box-shadow: 0 0 20px rgba(220, 38, 38, 0.4);
            transform: scale(1.05);
        }

        /* Hover Zoom Effect */
        .zoom-container:hover .zoom-image {
            transform: scale(1.5);
        }

        .zoom-image {
            transition: transform 0.4s ease;
        }

        /* Animations */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes slideInLeft {
            from { opacity: 0; transform: translateX(-30px); }
            to { opacity: 1; transform: translateX(0); }
        }

        @keyframes slideInRight {
            from { opacity: 0; transform: translateX(30px); }
            to { opacity: 1; transform: translateX(0); }
        }

        .animate-fade-in {
            animation: fadeIn 0.5s ease-out forwards;
        }

        .animate-slide-left {
            animation: slideInLeft 0.6s ease-out 0.1s forwards;
            opacity: 0;
        }

        .animate-slide-right {
            animation: slideInRight 0.6s ease-out 0.2s forwards;
            opacity: 0;
        }

        /* Scrollbar Hide */
        .scrollbar-hide::-webkit-scrollbar {
            display: none;
        }

        .scrollbar-hide {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }

        /* Red Glow Text */
        .text-glow-red {
            text-shadow: 0 0 40px rgba(220, 38, 38, 0.3);
        }

        /* Navigation Arrow */
        .nav-arrow {
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .image-container:hover .nav-arrow {
            opacity: 1;
        }

        /* Responsive adjustments */
        @media (max-width: 1024px) {
            .two-column-grid {
                grid-template-columns: 1fr !important;
            }
        }
    </style>
</head>
<body>
    <!-- Close Button -->
    <button onclick="window.history.back()" 
            class="fixed top-4 right-4 sm:top-6 sm:right-6 z-50 w-12 h-12 rounded-full 
                   bg-black/60 backdrop-blur-md border border-white/10 
                   text-white flex items-center justify-center 
                   hover:bg-red-600/80 hover:border-red-500/50 
                   transition-all duration-300 group shadow-lg">
        <iconify-icon icon="lucide:x" width="20"></iconify-icon>
    </button>

    <!-- Main Content -->
    <div class="min-h-screen flex items-center justify-center p-4 sm:p-6 lg:p-8">
        <div class="w-full max-w-7xl animate-fade-in">
            
            <!-- Two Column Layout -->
            <div class="grid grid-cols-1 lg:grid-cols-2 gap-6 lg:gap-8 items-start">
                
                <!-- LEFT COLUMN: Image Gallery System -->
                <div class="space-y-4 animate-slide-left">
                    
                    <!-- Tab Navigation -->
                    <div class="flex gap-3 mb-4">
                        <button onclick="switchTab('exterior')" id="tab-exterior"
                                class="flex-1 py-3 px-4 rounded-xl text-sm font-medium tracking-wide
                                       transition-all duration-300 border tab-active">
                            Exterior
                        </button>
                        <button onclick="switchTab('interior')" id="tab-interior"
                                class="flex-1 py-3 px-4 rounded-xl text-sm font-medium tracking-wide
                                       transition-all duration-300 border bg-white/5 border-white/10 text-gray-400 hover:border-white/20">
                            Interior
                        </button>
                    </div>

                    <!-- Main Image Display -->
                    <div class="relative aspect-video rounded-2xl overflow-hidden 
                                bg-gradient-to-br from-white/5 to-white/10 
                                border border-white/10 shadow-2xl image-container"
                         ontouchstart="handleTouchStart(event)"
                         ontouchmove="handleTouchMove(event)"
                         ontouchend="handleTouchEnd()">
                        
                        <img id="main-image" 
                             src="" 
                             alt="Car Image"
                             class="absolute inset-0 w-full h-full object-cover zoom-image"
                             style="cursor: zoom-in;">
                        
                        <!-- Gradient Overlay -->
                        <div class="absolute inset-0 bg-gradient-to-t from-black/40 via-transparent to-black/20 pointer-events-none"></div>

                        <!-- Navigation Arrows -->
                        <button onclick="prevImage()" 
                                class="nav-arrow absolute left-3 top-1/2 -translate-y-1/2 z-20 
                                       w-10 h-10 rounded-full bg-black/50 backdrop-blur-sm 
                                       border border-white/10 text-white 
                                       flex items-center justify-center 
                                       hover:bg-red-600/80 hover:border-red-500/50
                                       transition-all duration-300">
                            <iconify-icon icon="lucide:chevron-left" width="20"></iconify-icon>
                        </button>
                        <button onclick="nextImage()" 
                                class="nav-arrow absolute right-3 top-1/2 -translate-y-1/2 z-20 
                                       w-10 h-10 rounded-full bg-black/50 backdrop-blur-sm 
                                       border border-white/10 text-white 
                                       flex items-center justify-center 
                                       hover:bg-red-600/80 hover:border-red-500/50
                                       transition-all duration-300">
                            <iconify-icon icon="lucide:chevron-right" width="20"></iconify-icon>
                        </button>

                        <!-- Image Counter -->
                        <div class="absolute bottom-4 right-4 z-20 
                                    px-3 py-1.5 rounded-full 
                                    bg-black/60 backdrop-blur-md 
                                    border border-white/10 
                                    text-xs font-medium text-white/90">
                            <span id="image-counter">1 / 3</span>
                        </div>

                        <!-- Car Name Overlay -->
                        <div class="absolute bottom-4 left-4 z-20">
                            <span class="text-[10px] uppercase tracking-[0.2em] text-red-400 font-semibold">
                                Premium Selection
                            </span>
                            <h2 id="car-name-display" class="font-serif text-xl sm:text-2xl text-white mt-1 drop-shadow-lg">
                                Loading...
                            </h2>
                        </div>
                    </div>

                    <!-- Thumbnail Previews -->
                    <div id="thumbnails-container" 
                         class="flex gap-2 overflow-x-auto pb-2 scrollbar-hide">
                        <!-- Thumbnails will be dynamically inserted here -->
                    </div>
                </div>

                <!-- RIGHT COLUMN: Car Information & Pricing Card -->
                <div class="space-y-6 animate-slide-right">
                    
                    <!-- Premium Info Card -->
                    <div class="rounded-2xl glass-card overflow-hidden">
                        
                        <!-- Car Basic Info -->
                        <div class="p-6 sm:p-8 space-y-6">
                            <div>
                                <h1 id="car-title" class="font-serif text-3xl sm:text-4xl text-white mb-2 tracking-tight">
                                    Loading...
                                </h1>
                                <p id="car-year" class="text-sm text-gray-400 font-light">
                                    Registration Year: --
                                </p>
                            </div>

                            <!-- Price Section - ONLY Final Price -->
                            <div class="py-6 border-t border-b border-white/10">
                                <div class="text-center">
                                    <p class="text-xs uppercase tracking-[0.2em] text-gray-400 mb-2">
                                        Exclusive Price
                                    </p>
                                    <p id="car-price" class="text-4xl sm:text-5xl font-bold text-red-500 text-glow-red">
                                        --
                                    </p>
                                </div>
                            </div>

                            <!-- Specifications Grid -->
                            <div class="grid grid-cols-2 gap-4">
                                <div class="group p-4 rounded-xl bg-white/[0.03] 
                                           border border-white/5 
                                           hover:border-red-500/30 
                                           transition-all duration-300">
                                    <div class="flex items-center gap-2 mb-2">
                                        <iconify-icon icon="lucide:gauge" width="16" class="text-red-400"></iconify-icon>
                                        <span class="text-[10px] uppercase tracking-widest text-gray-400">
                                            Kilometers
                                        </span>
                                    </div>
                                    <p id="car-km" class="text-base font-medium text-white group-hover:text-red-400 transition-colors">
                                        --
                                    </p>
                                </div>

                                <div class="group p-4 rounded-xl bg-white/[0.03] 
                                           border border-white/5 
                                           hover:border-red-500/30 
                                           transition-all duration-300">
                                    <div class="flex items-center gap-2 mb-2">
                                        <iconify-icon icon="lucide:gas-pump" width="16" class="text-red-400"></iconify-icon>
                                        <span class="text-[10px] uppercase tracking-widest text-gray-400">
                                            Fuel Type
                                        </span>
                                    </div>
                                    <p id="car-fuel" class="text-base font-medium text-white group-hover:text-red-400 transition-colors">
                                        --
                                    </p>
                                </div>

                                <div class="group p-4 rounded-xl bg-white/[0.03] 
                                           border border-white/5 
                                           hover:border-red-500/30 
                                           transition-all duration-300">
                                    <div class="flex items-center gap-2 mb-2">
                                        <iconify-icon icon="lucide:settings" width="16" class="text-red-400"></iconify-icon>
                                        <span class="text-[10px] uppercase tracking-widest text-gray-400">
                                            Transmission
                                        </span>
                                    </div>
                                    <p id="car-trans" class="text-base font-medium text-white group-hover:text-red-400 transition-colors">
                                        --
                                    </p>
                                </div>

                                <div class="group p-4 rounded-xl bg-white/[0.03] 
                                           border border-white/5 
                                           hover:border-red-500/30 
                                           transition-all duration-300">
                                    <div class="flex items-center gap-2 mb-2">
                                        <iconify-icon icon="lucide:user-check" width="16" class="text-red-400"></iconify-icon>
                                        <span class="text-[10px] uppercase tracking-widest text-gray-400">
                                            Ownership
                                        </span>
                                    </div>
                                    <p id="car-owner" class="text-base font-medium text-white group-hover:text-red-400 transition-colors">
                                        --
                                    </p>
                                </div>
                            </div>

                            <!-- Registration State -->
                            <div class="p-4 rounded-xl bg-white/[0.03] border border-white/5">
                                <div class="flex items-center gap-2 mb-2">
                                    <iconify-icon icon="lucide:map-pin" width="16" class="text-red-400"></iconify-icon>
                                    <span class="text-[10px] uppercase tracking-widest text-gray-400">
                                        Registration State
                                    </span>
                                </div>
                                <p class="text-base font-medium text-white">
                                    Haryana (HR)
                                </p>
                            </div>
                        </div>

                        <!-- CTA Section -->
                        <div class="p-6 sm:p-8 bg-gradient-to-t from-black/40 to-transparent 
                                    border-t border-white/10 space-y-4">
                            
                            <!-- Book Test Drive Button -->
                            <button onclick="window.location.href='tel:+919354719192'"
                                    class="btn-premium w-full py-4 px-6 rounded-xl 
                                           text-white font-semibold text-sm 
                                           uppercase tracking-wider 
                                           border border-red-500/50
                                           flex items-center justify-center gap-3">
                                <iconify-icon icon="lucide:calendar-check" width="20"></iconify-icon>
                                Book Free Test Drive
                            </button>

                            <!-- Floating Action Buttons -->
                            <div class="grid grid-cols-2 gap-3">
                                <a href="https://wa.me/919354719192" 
                                   target="_blank" 
                                   rel="noreferrer"
                                   class="flex items-center justify-center gap-2 py-3 px-4 
                                          rounded-xl bg-green-600/90 backdrop-blur-sm 
                                          text-white font-medium text-sm 
                                          border border-green-500/50
                                          hover:bg-green-500 transition-all duration-300 
                                          shadow-lg shadow-green-500/20">
                                    <iconify-icon icon="lucide:message-circle" width="18"></iconify-icon>
                                    WhatsApp
                                </a>
                                <a href="tel:+919354719192"
                                   class="flex items-center justify-center gap-2 py-3 px-4 
                                          rounded-xl bg-blue-600/90 backdrop-blur-sm 
                                          text-white font-medium text-sm 
                                          border border-blue-500/50
                                          hover:bg-blue-500 transition-all duration-300 
                                          shadow-lg shadow-blue-500/20">
                                    <iconify-icon icon="lucide:phone" width="18"></iconify-icon>
                                    Call Now
                                </a>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Sample car data (in production, this would come from URL params or API)
        const carData = {
            name: "SWIFT VXI",
            price: "₹4,50,000",
            year: "2020 DECEMBER",
            km: "64,000 km",
            fuel: "PETROL",
            trans: "Manual",
            owner: "1st Owner",
            images: [
                "/GautamAutomobile/cars/Swift.jpeg",
                "https://images.unsplash.com/photo-1609521263047-f8f205293f24?w=800&q=80",
                "https://images.unsplash.com/photo-1549317661-bd32c8ce0afa?w=800&q=80",
                "https://images.unsplash.com/photo-1552519507-da3b142c6e3d?w=800&q=80",
                "https://images.unsplash.com/photo-1503376780353-7e6692767b70?w=800&q=80"
            ]
        };

        // State
        let currentImageIndex = 0;
        let activeTab = 'exterior';
        let exteriorImages = [];
        let interiorImages = [];
        let touchStartX = 0;
        let touchEndX = 0;

        // Initialize
        function init() {
            // Split images into exterior and interior (alternating for demo)
            exteriorImages = carData.images.filter((_, index) => index % 2 === 0);
            interiorImages = carData.images.filter((_, index) => index % 2 !== 0);
            
            // Populate car info
            document.getElementById('car-name-display').textContent = carData.name;
            document.getElementById('car-title').textContent = carData.name;
            document.getElementById('car-year').textContent = `Registration Year: ${carData.year}`;
            document.getElementById('car-price').textContent = carData.price;
            document.getElementById('car-km').textContent = carData.km;
            document.getElementById('car-fuel').textContent = carData.fuel;
            document.getElementById('car-trans').textContent = carData.trans;
            document.getElementById('car-owner').textContent = carData.owner;

            // Render initial gallery
            renderGallery();
        }

        // Switch Tab
        function switchTab(tab) {
            activeTab = tab;
            currentImageIndex = 0;
            
            // Update tab styles
            document.getElementById('tab-exterior').className = 
                `flex-1 py-3 px-4 rounded-xl text-sm font-medium tracking-wide
                       transition-all duration-300 border ${
                    tab === 'exterior' 
                        ? 'tab-active' 
                        : 'bg-white/5 border-white/10 text-gray-400 hover:border-white/20'
                }`;
            
            document.getElementById('tab-interior').className = 
                `flex-1 py-3 px-4 rounded-xl text-sm font-medium tracking-wide
                       transition-all duration-300 border ${
                    tab === 'interior' 
                        ? 'tab-active' 
                        : 'bg-white/5 border-white/10 text-gray-400 hover:border-white/20'
                }`;

            renderGallery();
        }

        // Render Gallery
        function renderGallery() {
            const images = activeTab === 'exterior' ? exteriorImages : interiorImages;
            
            // Update main image
            document.getElementById('main-image').src = images[currentImageIndex];
            
            // Update counter
            document.getElementById('image-counter').textContent = 
                `${currentImageIndex + 1} / ${images.length}`;

            // Render thumbnails
            const thumbnailsContainer = document.getElementById('thumbnails-container');
            thumbnailsContainer.innerHTML = images.map((img, idx) => `
                <button onclick="goToImage(${idx})"
                        class="flex-shrink-0 w-20 h-14 rounded-lg overflow-hidden 
                               border-2 transition-all duration-300 ${
                            idx === currentImageIndex 
                                ? 'thumbnail-active' 
                                : 'border-white/10 opacity-60 hover:opacity-100 hover:border-white/30'
                        }">
                    <img src="${img}" alt="Thumbnail ${idx + 1}" 
                         class="w-full h-full object-cover">
                </button>
            `).join('');
        }

        // Navigation
        function nextImage() {
            const images = activeTab === 'exterior' ? exteriorImages : interiorImages;
            currentImageIndex = (currentImageIndex + 1) % images.length;
            renderGallery();
        }

        function prevImage() {
            const images = activeTab === 'exterior' ? exteriorImages : interiorImages;
            currentImageIndex = (currentImageIndex - 1 + images.length) % images.length;
            renderGallery();
        }

        function goToImage(index) {
            currentImageIndex = index;
            renderGallery();
        }

        // Touch gestures for mobile swipe
        function handleTouchStart(event) {
            touchStartX = event.touches[0].clientX;
        }

        function handleTouchMove(event) {
            touchEndX = event.touches[0].clientX;
        }

        function handleTouchEnd() {
            if (touchStartX - touchEndX > 50) {
                nextImage();
            }
            if (touchEndX - touchStartX > 50) {
                prevImage();
            }
            touchStartX = 0;
            touchEndX = 0;
        }

        // Keyboard navigation
        document.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowRight') nextImage();
            if (e.key === 'ArrowLeft') prevImage();
            if (e.key === 'Escape') window.history.back();
        });

        // Initialize on load
        init();
    </script>
</body>
</html>
